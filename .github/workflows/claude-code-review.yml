name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このプルリクエストをレビューしてください。観点:
            - バグや不具合の可能性
            - データ整合性(pomodoro-data.json のスキーマ/移行)への影響
            - セキュリティ上の懸念
            - 可読性・保守性の改善余地

            PR ブランチは既にカレントディレクトリにチェックアウト済みです。
            総評は `gh pr comment` で、具体的な箇所の指摘は
            `mcp__github_inline_comment__create_inline_comment`(confirmed: true)で
            インラインコメントとして投稿してください。
            レビューはすべて日本語で、GitHub コメントとしてのみ投稿し、
            メッセージ本文には出力しないでください。

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
